      <line x1="320" y1="328" x2="256" y2="355"/>
      <line x1="256" y1="245" x2="256" y2="355"/>
      <line x1="130" y1="315" x2="160" y2="365"/>
      <line x1="195" y1="330" x2="160" y2="365"/>
      <line x1="385" y1="310" x2="355" y2="362"/>
      <line x1="320" y1="328" x2="355" y2="362"/>
      <line x1="160" y1="365" x2="256" y2="355"/>
      <line x1="355" y1="362" x2="256" y2="355"/>

      <!-- Stem connections -->
      <line x1="256" y1="355" x2="256" y2="420"/>
    </g>

    <!-- Neural nodes (dots) -->
    <g fill="url(#g)">
      <!-- Top -->
      <circle cx="256" cy="100" r="6"/>
      <circle cx="210" cy="120" r="5"/>
      <circle cx="305" cy="118" r="5"/>

      <!-- Upper mid -->
      <circle cx="170" cy="155" r="5"/>
      <circle cx="256" cy="155" r="7"/>
      <circle cx="345" cy="150" r="5"/>

      <!-- Mid row -->
      <circle cx="135" cy="200" r="4.5"/>
      <circle cx="200" cy="200" r="4.5"/>
      <circle cx="315" cy="198" r="4.5"/>
      <circle cx="380" cy="195" r="4.5"/>

      <!-- Center -->
      <circle cx="256" cy="245" r="7"/>

      <!-- Mid-lower -->
      <circle cx="115" cy="255" r="4"/>
      <circle cx="175" cy="265" r="4.5"/>
      <circle cx="340" cy="260" r="4.5"/>
      <circle cx="400" cy="250" r="4"/>

      <!-- Lower -->
      <circle cx="130" cy="315" r="4"/>
      <circle cx="195" cy="330" r="4.5"/>
      <circle cx="320" cy="328" r="4.5"/>
      <circle cx="385" cy="310" r="4"/>

      <!-- Bottom -->
      <circle cx="160" cy="365" r="4"/>
      <circle cx="256" cy="355" r="6"/>
      <circle cx="355" cy="362" r="4"/>

      <!-- Stem -->
      <circle cx="256" cy="420" r="4.5"/>
