<svg viewBox="80 60 352 392" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60cfff"/>
      <stop offset="50%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#b084fc"/>
    </linearGradient>
  </defs>

  <g filter="url(#glow)">
    <!-- Brain silhouette outline -->
    <path d="
      M255 85
      C230 83, 200 90, 175 105
      C148 122, 128 148, 115 178
      C102 208, 98 240, 102 268
      C106 296, 118 320, 132 340
      C146 360, 165 375, 188 382
      C205 388, 222 386, 238 378
      C248 372, 254 365, 258 358
      C262 365, 268 372, 278 378
      C294 386, 311 388, 328 382
      C351 375, 370 360, 384 340
      C398 320, 410 296, 414 268
      C418 240, 414 208, 401 178
      C388 148, 368 122, 341 105
      C316 90, 286 83, 258 85
      Z"
      stroke="url(#g)" stroke-width="2.5" fill="none" opacity="0.6"/>

    <!-- Brain stem -->
    <path d="M238 378 C235 395, 240 415, 256 430 C272 415, 277 395, 274 378"
      stroke="url(#g)" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- Central fissure -->
    <path d="M256 88 C256 120, 257 200, 256 300"
