      <line x1="175" y1="265" x2="130" y2="315"/>
      <line x1="175" y1="265" x2="195" y2="330"/>
      <line x1="130" y1="315" x2="195" y2="330"/>
      <line x1="256" y1="245" x2="195" y2="330"/>

      <!-- Lower right -->
      <line x1="400" y1="250" x2="385" y2="310"/>
      <line x1="340" y1="260" x2="385" y2="310"/>
      <line x1="340" y1="260" x2="320" y2="328"/>
      <line x1="385" y1="310" x2="320" y2="328"/>
      <line x1="256" y1="245" x2="320" y2="328"/>

      <!-- Bottom -->
