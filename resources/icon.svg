    <!-- Neural connection lines -->
    <g stroke="url(#g)" stroke-width="1.5" opacity="0.55">
      <!-- Top cluster -->
      <line x1="256" y1="100" x2="210" y2="120"/>
      <line x1="256" y1="100" x2="305" y2="118"/>
      <line x1="210" y1="120" x2="170" y2="155"/>
      <line x1="305" y1="118" x2="345" y2="150"/>
      <line x1="210" y1="120" x2="256" y2="155"/>
      <line x1="305" y1="118" x2="256" y2="155"/>
      <line x1="210" y1="120" x2="305" y2="118"/>

      <!-- Upper-mid left -->
      <line x1="170" y1="155" x2="135" y2="200"/>
      <line x1="170" y1="155" x2="200" y2="200"/>
      <line x1="170" y1="155" x2="256" y2="155"/>
      <line x1="135" y1="200" x2="200" y2="200"/>
      <line x1="200" y1="200" x2="256" y2="155"/>

      <!-- Upper-mid right -->
      <line x1="345" y1="150" x2="380" y2="195"/>
      <line x1="345" y1="150" x2="315" y2="198"/>
      <line x1="345" y1="150" x2="256" y2="155"/>
      <line x1="380" y1="195" x2="315" y2="198"/>
      <line x1="315" y1="198" x2="256" y2="155"/>

      <!-- Center hub -->
      <line x1="256" y1="155" x2="200" y2="200"/>
      <line x1="256" y1="155" x2="315" y2="198"/>
      <line x1="256" y1="155" x2="256" y2="245"/>
      <line x1="200" y1="200" x2="256" y2="245"/>
      <line x1="315" y1="198" x2="256" y2="245"/>

      <!-- Mid left -->
      <line x1="135" y1="200" x2="115" y2="255"/>
      <line x1="135" y1="200" x2="175" y2="265"/>
      <line x1="115" y1="255" x2="175" y2="265"/>
      <line x1="200" y1="200" x2="175" y2="265"/>
      <line x1="175" y1="265" x2="256" y2="245"/>

      <!-- Mid right -->
